name: Build & Release

on:
  push:
    tags:
      - 'v*'
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build rift.exe (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash target\x86_64-pc-windows-msvc\release\rift.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  rift.exe" | Out-File -Encoding ascii rift.exe.sha256
          Write-Host "SHA256: $hash"

      - name: Upload artifacts (main branch)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: rift-windows-x64
          path: |
            target/x86_64-pc-windows-msvc/release/rift.exe
            rift.exe.sha256

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-pc-windows-msvc/release/rift.exe
            rift.exe.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
